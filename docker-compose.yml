services:
  mitmproxy:
    image: "mitmproxy/mitmproxy:latest"
    container_name: mitmproxy_wireguard
    ports:
      - "8081:8081"
      - "51820:51820/udp"
    volumes:
      - "./mitmproxy_data:/home/mitmproxy/.mitmproxy"
    cap_add:
      - NET_ADMIN 
    command: >
      mitmweb
      --mode wireguard
      --web-host 0.0.0.0
      --set web_password=${WEB_PASSWORD:-password}
    restart: unless-stopped